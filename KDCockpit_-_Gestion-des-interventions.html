document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

iconDotCircle }}<\u002Fspan>\n    <\u002Fdiv>\n    <nav style=\"flex:1;overflow-y:auto;padding:10px 0\" data-comment-anchor=\"30adc23e09-nav\">\n      <sc-for list=\"{{ navItems }}\" as=\"it\" hint-placeholder-count=\"10\">\n        <div style=\"{{ it.style }}\" onclick=\"{{ it.onClick }}\" style-hover=\"background:rgba(255,255,255,0.05);color:#E6EBF1\">\n          <span style=\"flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ it.label }}<\u002Fspan>\n          <sc-if value=\"{{ it.badge }}\" hint-placeholder-val=\"{{ 0 }}\">\n            <span style=\"background:var(--accent);color:#15212E;font-size:10.5px;font-weight:700;border-radius:10px;padding:1px 7px;line-height:1.5\">{{ it.badgeStr }}<\u002Fspan>\n          <\u002Fsc-if>\n          <span style=\"display:flex;align-items:center;justify-content:center;width:18px;opacity:.85\">{{ it.iconEl }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fnav>\n    <div style=\"border-top:1px solid rgba(255,255,255,0.06);padding:12px 16px\">\n      <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px\" data-comment-anchor=\"d5ec6a6c68-div\">\n        <div style=\"width:30px;height:30px;border-radius:50%;background:var(--accent);color:#15212E;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px\">{{ userInitials }}<\u002Fdiv>\n        <div style=\"min-width:0;flex:1\">\n          <div style=\"color:#E6EBF1;font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ userName }}<\u002Fdiv>\n          <div style=\"color:#7E8896;font-size:11px\">{{ roleLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div onclick=\"{{ onToggleCheat }}\" title=\"Afficher / masquer le Cheat Mode (Ctrl+Maj+C puis Ctrl+Maj+M)\" style=\"{{ cheatBtnStyle }}\" style-hover=\"background:rgba(242,194,0,0.18);border-color:#F2C200;color:#C7E08A\" data-comment-anchor=\"83c4652069-div\">⌗ Cheat<\u002Fdiv>\n      <\u002Fdiv>\n      <di -size:11px;font-weight:700;padding:2px 8px;border-radius:5px;letter-spacing:.2px\">{{ n.ref }}<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:13px;font-weight:700;color:#1F2933;line-height:1.35\">{{ n.titre }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#5A6573;line-height:1.4;margin-top:2px\">{{ n.text }}<\u002Fdiv>\n              <div style=\"font-size:11.5px;color:#A2A9B1;margin-top:4px\">{{ n.ts }}<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ n.unread }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px\"><\u002Fspan><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ================= FILTER PANEL ================= -->\n  <sc-if value=\"{{ filterOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ onCloseFilters }}\" style=\"position:fixed;inset:0;background:rgba(20,33,46,0.25);z-index:70\"><\u002Fdiv>\n    <div style=\"position:fixed;top:0;right:0;bottom:0;width:360px;background:#fff;box-shadow:-8px 0 30px rgba(20,33,46,0.16);z-index:71;display:flex;flex-direction:column;animation:kdslide .18s ease\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #EEF0F2\" data-comment-anchor=\"a20cfdbdde-div\">\n        <span style=\"font-weight:700;font-size:15px\" data-comment-anchor=\"65580c8d94-span\">Filtres<\u002Fspan>\n        <span style=\"cursor:pointer;display:flex;color:#8A929C\" onclick=\"{{ onCloseFilters }}\">{{ iconClose }}<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"flex:1;overflow-y:auto;padding:20px\">\n        <div style=\"font-size:11.5px;font-weight:700;letter-spacing:.5px;color:#5A6573;text-transform:uppercase;margin-bottom:12px\">Statut<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px;margin-bottom:24px\">\n \"{{ o.onClick }}\">{{ o.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font-size:11.5px;font-weight:700;letter-spacing:.5px;color:#5A6573;text-transform:uppercase;margin-bottom:12px\">Type d'intervention<\u002Fdiv>\n        <div style=\"display:flex;gap:8px;margin-bottom:24px\">\n          <sc-for list=\"{{ typeFilterOptions }}\" as=\"o\" hint-placeholder-count=\"3\">\n            <div style=\"{{ o.style }}\" onclick=\"{{ o.onClick }}\">{{ o.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font-size:11.5px;font-weight:700;letter-spacing:.5px;color:#5A6573;text-transform:uppercase;margin-bottom:12px\">Bâtiment<\u002Fdiv>\n        <select style=\"width:100%;height:38px;border:1px solid #E0E3E7;border-radius:6px;padding:0 10px;font-size:13px;color:#3A434E;margin-bottom:24px\">\n          <option>Tous les bâtiments<\u002Foption><option>IGA-L...-122._Bâtiment Accinauto (Propriétaire Tiers)<\u002Foption><option>IGA-L...-093._Bâtiment administratif et sanitaire (BAS) L CRM (Propriétaire CFL)<\u002Foption><option>IGA-WF..-002._Bâtiment voyageurs Wf<\u002Foption><option>IGA-KY..-001._Bâtiment voyageurs Ky<\u002Foption><option>IGA-L...-003._Bâtiment voyageurs L<\u002Foption><option>IGA-KT..-003._Bâtiment voyageurs Kt<\u002Foption>\n        <\u002Fselect>\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:12px\">\n          <span style=\"font-size:11.5px;font-weight:700;letter-spacing:.5px;color:#5A6573;text-transform:uppercase\">Filtre regex sur le titre<\u002Fspan>\n          <span style=\"font-size:10px;font-weight:700;color:#8A6A12;background:rgba(242,194,0,0.15);border-radius:4px;padding:1px 6px\">avancé<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:11.5px;color:#8A929C;margin-bottom:5px\">Inclure (titres correspondant au motif)<\u002Fdiv>\n        <input value=\"{{ draftReInc }}\" onchange=\"{{ onReInc }}\" placeholder=\"ex. A\\.I\\.1|Circuit\" style=\"{{ reIncStyle }}\">\n        <div style=\"font-size:11.5px;color:#8A929C;margin:14px 0 5px\">Exclure (titres correspondant au motif)<\u002Fdiv>\n        <input value=\"{{ draftReExc }}\" onchange=\"{{ onReExc }}\" placeholder=\"ex. Clôturé|Refusé\" style=\"{{ reExcStyle }}\">\n        <sc-if value=\"{{ reError }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:11.5px;color:#C23933;margin-top:8px;display:flex;align-items:center;gap:6px\">⚠ {{ reErrorMsg }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"font-size:11px;color:#A2A9B1;margin-top:8px;line-height:1.45\">Insensible à la casse. S'applique au titre complet « [workflow] || [étape] || [circuit] ».<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:10px;padding:16px 20px;border-top:1px solid #EEF0F2\">\n        <button onclick=\"{{ onResetFilters }}\" style=\"flex:1;background:#fff;border:1px solid #E0E3E7;border-radius:7px;padding:11px;font-weight:600;font-size:13px;cursor:pointer;color:#3A434E\">Réinitialiser<\u002Fbutton>\n        <button onclick=\"{{ onApplyFilters }}\" style=\"flex:1;background:var(--accent);color:#15212E;border:none;border-radius:7px;padding:11px;font-weight:700;font-size:13px;cursor:pointer\">Appliquer<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ================= MODALS ================= -->\n  <sc-if value=\"{{ modalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:rgba(20,33,46,0.4);z-index:80;display:flex;align-items:center;justify-content:center;animation:kdfade .15s ease\" onclick=\"{{ onCloseModal }}\">\n      <div onclick=\"{{ onStopProp }}\" style=\"background:#fff;border-radius:12px;width:460px;max-width:92vw;box-shadow:0 20px 60px rgba(20,33,46,0.3);overflow:hidden\">\n\n        <!-- REFUS -->\n        <sc-if value=\"{{ isModalRefus }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:22px 24px\">\n            <div sty
